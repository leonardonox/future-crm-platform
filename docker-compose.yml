services:
  postgres:
    image: postgres:16
    container_name: future_crm_postgres
    environment:
      POSTGRES_DB: future_crm
      POSTGRES_USER: future_user
      POSTGRES_PASSWORD: future_pass
    ports:
      - "5432:5432"
    volumes:
      - future_crm_pgdata:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    container_name: future_crm_api
    working_dir: /app
    command: bash -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

volumes:
  future_crm_pgdata:
